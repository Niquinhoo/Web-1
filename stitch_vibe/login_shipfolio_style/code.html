<!DOCTYPE html>

<html lang="es-AR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#10FF58", // Neon Green from Design System 9
              "on-primary": "#000000",
              "surface": "#F6F6F6",
              "on-surface": "#000000",
              "outline": "#000000",
              "surface-container": "#FFFFFF"
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["Space Grotesk", "sans-serif"],
              "label": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0px",
              "lg": "0px",
              "xl": "0px",
              "full": "0px"
            },
            boxShadow: {
              "brutal": "4px 4px 0px 0px rgba(0,0,0,1)",
              "brutal-lg": "8px 8px 0px 0px rgba(0,0,0,1)",
              "brutal-hover": "2px 2px 0px 0px rgba(0,0,0,1)"
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Space Grotesk', sans-serif; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neo-brutal-border {
            border: 2px solid #000000;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary selection:text-on-primary">
<!-- TopNavBar Component from COMPONENTS_10 -->
<nav class="flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50 bg-[#f6f6f6] dark:bg-neutral-900 border-b-2 border-neutral-900 dark:border-neutral-100 shadow-[4px_4px_0px_0px_rgba(45,47,47,1)]">
<div class="text-2xl font-black tracking-tighter text-neutral-900 dark:text-white font-['Space_Grotesk']">
            SHIPFOLIO
        </div>
<div class="hidden md:flex gap-8 items-center">
<a class="font-['Space_Grotesk'] tracking-tight text-sm uppercase text-neutral-600 dark:text-neutral-400 font-medium hover:bg-[#0eff58] hover:text-black transition-colors duration-150 px-2 py-1" href="#">Inicio</a>
<a class="font-['Space_Grotesk'] tracking-tight text-sm uppercase text-[#006b1f] dark:text-[#0eff58] border-b-2 border-neutral-900 dark:border-[#0eff58] font-bold px-2 py-1" href="#">Productos</a>
<a class="font-['Space_Grotesk'] tracking-tight text-sm uppercase text-neutral-600 dark:text-neutral-400 font-medium hover:bg-[#0eff58] hover:text-black transition-colors duration-150 px-2 py-1" href="#">Colecciones</a>

<div class="w-8 h-8 bg-primary neo-brutal-border"></div>
</div>
</nav>
<main class="flex-grow flex items-center justify-center p-6 bg-[radial-gradient(#00000010_1px,transparent_1px)] [background-size:20px_20px]">
<div class="w-full max-w-md">
<!-- Brand Header -->
<div class="text-left mb-10">
<h1 class="text-5xl font-black tracking-tighter text-on-surface uppercase leading-none">
                    LA<br/>CURADURÍA
                </h1>
<div class="mt-2 inline-block bg-primary px-2 py-1 neo-brutal-border font-bold text-xs uppercase tracking-widest">
                    LABORATORIO KINÉTICO v.09
                </div>
</div>
<!-- Login Card -->
<div class="bg-surface-container neo-brutal-border shadow-brutal-lg p-8 md:p-10 relative overflow-hidden">

<div class="absolute top-0 right-0 w-12 h-12 bg-primary border-l-2 border-b-2 border-black"></div>
<div class="mb-10">
<h2 class="text-3xl font-black text-on-surface uppercase tracking-tight mb-1">
                        ACCESO_SISTEMA
                    </h2>
<p class="text-on-surface font-medium text-sm border-l-4 border-primary pl-3">
                        Ingresá tus credenciales para la autenticación de usuario.
                    </p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-black text-on-surface uppercase tracking-widest" for="email">
                            [ EMAIL ]
                        </label>
<div class="relative">
<input class="w-full h-14 bg-white neo-brutal-border px-4 text-on-surface font-bold placeholder:text-neutral-400 focus:ring-0 focus:bg-primary/10 transition-all outline-none" id="email" placeholder="USUARIO@SHIPFOLIO.LAB" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-xs font-black text-on-surface uppercase tracking-widest" for="password">
                            [ CONTRASEÑA ]
                        </label>
<div class="relative">
<input class="w-full h-14 bg-white neo-brutal-border px-4 text-on-surface font-bold placeholder:text-neutral-400 focus:ring-0 focus:bg-primary/10 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="group w-full h-14 bg-primary text-black font-black uppercase neo-brutal-border shadow-brutal hover:shadow-brutal-hover active:translate-x-1 active:translate-y-1 transition-all flex items-center justify-center gap-2" type="submit">
<span>EJECUTAR INGRESO</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t-2 border-black"></div>
<span class="flex-shrink mx-4 text-black text-xs font-black uppercase">o_vía</span>
<div class="flex-grow border-t-2 border-black"></div>
</div>
<!-- Social Login -->
<button class="w-full h-14 bg-white text-black font-black uppercase neo-brutal-border flex items-center justify-center gap-3 hover:bg-neutral-100 shadow-brutal hover:shadow-brutal-hover active:translate-x-1 active:translate-y-1 transition-all">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.83c.87-2.6 3.3-4.51 6.16-4.51z" fill="#EA4335"></path>
</svg>
                    Google_ID
                </button>
<!-- Redirect Link -->
<div class="mt-8 text-center">
<a class="text-on-surface text-xs font-black uppercase tracking-wider hover:text-primary transition-colors underline decoration-2 underline-offset-4" href="#">
                        ¿No tenés cuenta? <span class="bg-black text-white px-2 ml-1">REGISTRATE_AQUÍ</span>
</a>
</div>
</div>
</div>
</main>
<!-- Footer Component from COMPONENTS_10 -->
<footer class="w-full px-10 py-12 grid grid-cols-1 md:grid-cols-2 items-center gap-8 bg-[#f6f6f6] dark:bg-neutral-950 border-t-2 border-neutral-900 dark:border-neutral-100">
<div class="font-['Inter'] text-[10px] uppercase tracking-widest text-[#006b1f] dark:text-[#0eff58]">
            © 2024 SHIPFOLIO. KINETIC LABORATORY SPEC.
        </div>
<div class="flex flex-wrap gap-6 md:justify-end">
<a class="font-['Inter'] text-[10px] uppercase tracking-widest text-neutral-500 dark:text-neutral-400 hover:text-[#0eff58] opacity-80 hover:opacity-100 transition-opacity" href="#">Soporte</a>
<a class="font-['Inter'] text-[10px] uppercase tracking-widest text-neutral-500 dark:text-neutral-400 hover:text-[#0eff58] opacity-80 hover:opacity-100 transition-opacity" href="#">Privacidad</a>
<a class="font-['Inter'] text-[10px] uppercase tracking-widest text-neutral-500 dark:text-neutral-400 hover:text-[#0eff58] opacity-80 hover:opacity-100 transition-opacity" href="#">Términos</a>
<a class="font-['Inter'] text-[10px] uppercase tracking-widest text-neutral-900 dark:text-white underline opacity-80 hover:opacity-100 transition-opacity" href="#">Instagram</a>
<a class="font-['Inter'] text-[10px] uppercase tracking-widest text-neutral-500 dark:text-neutral-400 hover:text-[#0eff58] opacity-80 hover:opacity-100 transition-opacity" href="#">Twitter</a>
</div>
</footer>
