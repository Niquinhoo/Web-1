name: Sync Two-Way

on:
  push:
    branches:
      - 'Web-1-*'
      - 'MVC-Web-1'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync Between Repos
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          CURRENT_REPO="${{ github.event.repository.name }}"
          USER="${{ github.repository_owner }}"
          BRANCH_NAME="${{ github.ref_name }}"
          
          if [ -z "$SYNC_TOKEN" ]; then
            echo "ERROR: SYNC_TOKEN está vacío. Asegúrate de haberlo configurado en Settings > Secrets."
            exit 1
          fi
          
          if [ "$CURRENT_REPO" == "Web-1" ]; then
            # Pushing from Main to Satellite
            DEST_REPO="$BRANCH_NAME"
            echo "Sincronizando desde main (Web-1) al satélite ($DEST_REPO)..."
          else
            # Pushing from Satellite to Main
            DEST_REPO="Web-1"
            echo "Sincronizando desde satélite ($CURRENT_REPO) al repositorio principal ($DEST_REPO)..."
          fi
          
          # Configurar URL con token embebido
          DEST_URL="https://$USER:$SYNC_TOKEN@github.com/$USER/$DEST_REPO.git"
          
          # Añadir remoto y empujar
          git remote add destination "$DEST_URL"
          git push destination "$BRANCH_NAME:$BRANCH_NAME" --force
